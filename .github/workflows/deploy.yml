name: Build and commit Flutter output

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: '*'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    # Pinned Flutter version. Bump when you upgrade locally.
    container: instrumentisto/flutter:3.41.5

    environment: release

    # Skip when the bot is the one who just pushed, so its own commit
    # doesn't trigger another build of the same output.
    if: github.actor != 'resengi-release-bot[bot]'

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Build charts/
        working-directory: charts
        run: |
          flutter pub get
          flutter build web --release --output=../flutter-charts

      - name: Build examples/
        working-directory: examples
        run: |
          flutter pub get
          flutter build web --release --output=../flutter-examples

      - name: Commit build output to main
        run: |
          git config user.name "resengi-release-bot[bot]"
          git config user.email "resengi-release-bot[bot]@users.noreply.github.com"

          # Force-add: flutter-charts/ and flutter-examples/ are gitignored
          # so devs don't commit local builds. CI commits them intentionally.
          git add -f flutter-charts flutter-examples

          if git diff --cached --quiet; then
            echo "::notice::No build output changes. Nothing to commit."
            exit 0
          fi

          git commit -m "chore: rebuild Flutter web output [skip ci]"
          git push origin HEAD:main